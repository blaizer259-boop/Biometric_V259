<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Face Login</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="camera-panel" aria-label="Camera preview">
        <div class="video-wrap">
          <video id="camera" autoplay muted playsinline></video>
          <div class="scan-line" aria-hidden="true"></div>
        </div>
        <div class="camera-meta">
          <span id="cameraStatus" class="status-dot pending"></span>
          <span id="statusText">Starting camera and loading face models...</span>
        </div>
      </section>

      <section class="auth-panel" aria-labelledby="pageTitle">
        <p class="eyebrow">Secure biometric access</p>
        <h1 id="pageTitle">Face Login</h1>
        <p class="intro">
          Register your face descriptor once, then sign in by matching your webcam scan
          against the stored profile descriptor. Sit about 50cm from the camera with your
          face centered.
        </p>

        <div class="tabs" role="tablist" aria-label="Face login mode">
          <button id="loginTab" class="tab active" type="button">Login</button>
          <button id="registerTab" class="tab" type="button">Register</button>
        </div>

        <form id="registerForm" class="form hidden">
          <label for="email">Profile email</label>
          <div class="input-row">
            <input id="email" type="email" autocomplete="email" placeholder="name@example.com" />
            <button id="registerButton" type="submit">Register Face</button>
          </div>
        </form>

        <div id="loginActions" class="actions">
          <button id="loginButton" class="primary" type="button">Scan Face</button>
        </div>

        <div id="result" class="result" role="status" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
